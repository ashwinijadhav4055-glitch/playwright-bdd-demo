name: Playwright BDD Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'   # Run daily at 6AM UTC
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tags to run (e.g. @smoke, @ui, @api)'
        required: false
        default: ''

jobs:
  test:
    name: Run Playwright BDD Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env file
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}" >> .env
          echo "UI_USERNAME=${{ secrets.UI_USERNAME || 'standard_user' }}" >> .env
          echo "UI_PASSWORD=${{ secrets.UI_PASSWORD || 'secret_sauce' }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'https://dummyjson.com' }}" >> .env
          echo "API_USERNAME=${{ secrets.API_USERNAME || 'emilys' }}" >> .env
          echo "API_PASSWORD=${{ secrets.API_PASSWORD || 'emilyspass' }}" >> .env
          echo "HEADLESS=false" >> .env

      - name: Run UI Tests
        if: github.event.inputs.tags == '' || contains(github.event.inputs.tags, '@ui')
        run: npm run test:ui
        continue-on-error: true
        env:
          HEADLESS: false

      - name: Run API Tests
        if: github.event.inputs.tags == '' || contains(github.event.inputs.tags, '@api')
        run: npm run test:api
        continue-on-error: true

      - name: Run Smoke Tests
        if: github.event.inputs.tags == '@smoke'
        run: npm run test:smoke

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate allure-results --clean -o allure-report || true

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7

      - name: Upload Playwright Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 3

      - name: Publish Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Cucumber Test Results
          path: allure-results/cucumber-report.json
          reporter: java-junit
        continue-on-error: true
